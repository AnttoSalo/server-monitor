name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.antto.org
          username: jimi
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/dev/server-monitor
            git pull origin main
            npm install --production
            npm run build
            pm2 restart monitor
